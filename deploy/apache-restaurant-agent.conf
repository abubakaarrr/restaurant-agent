# ─────────────────────────────────────────────────────────────────────────
# Apache reverse-proxy vhost for the Restaurant AI Agent
#
# The app runs in Docker on 127.0.0.1:8000 (localhost only).
# Apache terminates HTTPS (your existing Certbot cert) and proxies to it.
#
# Domain:  agent.servicesground.com
# App dir: /var/www/dev/restaurant-agent
#
# Enable the required modules once:
#   sudo a2enmod proxy proxy_http ssl headers rewrite
#   sudo systemctl restart apache2
#
# Place this file at:
#   /etc/apache2/sites-available/restaurant-agent.conf
# Then:
#   sudo a2ensite restaurant-agent
#   sudo systemctl reload apache2
# ─────────────────────────────────────────────────────────────────────────

<VirtualHost *:80>
    ServerName agent.servicesground.com
    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName agent.servicesground.com

    SSLEngine on
    # These paths are created by Certbot. Run:
    #   sudo certbot --apache -d agent.servicesground.com
    # (or certonly) to generate them if this subdomain isn't covered yet.
    SSLCertificateFile      /etc/letsencrypt/live/agent.servicesground.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/agent.servicesground.com/privkey.pem

    # ── Reverse proxy to the Dockerised app ──
    ProxyPreserveHost On
    ProxyRequests Off

    # Stream Server-Sent Events (the Vapi Custom LLM endpoint) without buffering
    SetEnv proxy-sendchunked 1
    SetEnv proxy-nokeepalive 0

    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Pass the real client info to the app
    RequestHeader set X-Forwarded-Proto "https"

    ErrorLog  ${APACHE_LOG_DIR}/restaurant-agent-error.log
    CustomLog ${APACHE_LOG_DIR}/restaurant-agent-access.log combined
</VirtualHost>
